<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Aplicaciones</title>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #388E3C;
            --bg: #f5f5f5;
            --card: #ffffff;
            --text: #212121;
            --text-secondary: #757575;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --fitcycle: #2196F3;
            --fitcycle-dark: #1565C0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #37474F, #263238);
            color: white;
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
        .header p { font-size: 13px; opacity: 0.75; margin-top: 4px; }
        #env-badge { font-size: 0.55em; vertical-align: middle; opacity: 0.75; font-weight: normal; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 24px 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        @media (max-width: 400px) {
            .grid { grid-template-columns: 1fr; }
        }

        .app-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px 16px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
            border: none;
        }
        .app-card:active { transform: scale(0.97); }
        .app-card .icon { font-size: 48px; line-height: 1; }
        .app-card .name { font-size: 15px; font-weight: 700; text-align: center; }
        .app-card .desc { font-size: 12px; color: var(--text-secondary); text-align: center; line-height: 1.4; }
        .app-card .btn-open {
            margin-top: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
        }
        .eat .btn-open { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .fit .btn-open { background: linear-gradient(135deg, var(--fitcycle), var(--fitcycle-dark)); }
    </style>
</head>
<body>
    <div class="header">
        <h1>&#127968; Mis Aplicaciones <span id="env-badge"></span></h1>
        <p>Selecciona una aplicaci&oacute;n para abrirla</p>
    </div>

    <div class="grid">
        <div class="app-card eat" onclick="openApp('eat')">
            <div class="icon">&#129367;</div>
            <div class="name">EatHealthyCycle</div>
            <div class="desc">Gestiona tu dieta semanal y planes de comida</div>
            <button class="btn-open">Abrir</button>
        </div>
        <div class="app-card fit" onclick="openApp('fit')">
            <div class="icon">&#128170;</div>
            <div class="name">FitCycle</div>
            <div class="desc">Seguimiento de entrenamientos y actividad f&iacute;sica</div>
            <button class="btn-open">Abrir</button>
        </div>
    </div>

    <script>
        const APPS = {
            eat: window.location.origin,
            fit: 'http://fitcycle-production.up.railway.app'
        };

        function openApp(app) {
            window.open(APPS[app], '_blank');
        }

        // Show env badge
        fetch('/api/version')
            .then(r => r.json())
            .then(data => {
                const badge = document.getElementById('env-badge');
                if (data.env) {
                    badge.textContent = data.env === 'develop' ? '(D)' : '(P)';
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
